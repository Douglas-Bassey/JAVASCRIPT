    <!-- getElementsByClassName example --> 

     <h2>get element by class name</h2>

    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>

    <button id="colorBtn">Change all boxes</button>

    <script>
        document.getElementById("colorBtn")
        .addEventListener("click", function() {
            const boxes = document.getElementsByClassName("box");
            for (let i = 0; i < boxes.length; i++) {
                boxes[i].style.backgroundColor = "lightcoral";
                boxes[i].style.color = "white";
            }
        });
    </script>

    <!-- getElementByTagName example -->

    <h2 style="font-family: Verdana, Geneva, Tahoma, sans-serif;">Get element by tagname</h2>

    <p>paragraph 1</p>
    <p>paragraph 2</p>
    <p>paragraph 3</p>

    <button id="styleBtn">style all paragraphs</button>

    <script>
      document
        .getElementById("styleBtn")
        .addEventListener("click", function () {
          const paragraphs = document.getElementsByTagName("p");
          for (let para of paragraphs) {
            para.classList.add("highlight");
            para.style.backgroundColor = "yellow"
          }
          paragraphs[0].style.color = "red";
          paragraphs[1].style.color = "seagreen";
            paragraphs[2].style.color = "blue";
        });
    </script>

    <!-- Query selector all -->

     <h2>Query selector All</h2>

    <div class="card">JavaScript</div>
    <div class="card">React</div>
    <div class="card">Laravel</div>
    <div class="card">Python</div>

    <button id="activateBtn">Activate courses</button>

    <script>
        const cards = document.querySelectorAll(".card");
        const button = document.querySelector("#activateBtn");

        button.addEventListener("click" , function(){
            for (let card of cards) {
                card.classList.add("active");
                
            }
        })

        
    </script>
