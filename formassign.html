<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="formassign.css">
</head>
<body>
 
    <div class="container">

        <h2>
            Consalfa
        </h2>

        <form id="formlogin">

            <div class="input-group">
                <p>Email address</p>
                <input type="email" id="email" placeholder="douglas@gmail.com">
                <div class="error" id="emailError"></div>
            </div>


            <div class="input-group">
                <p>Full Name</p>
                <input type="text" id="name" placeholder="Douglas Bassey">
                <div class="error" id="nameError"></div>
            </div>


            <div class="input-group">
                <p>Password</p>
                <input type="password" id="password" placeholder="*****">

                <button type="button" class="toggle-btn" data-target="password">
                    show
                </button>

                <div class="strength" id="strengthBar"></div>

                <div class="error" id="passwordError"></div>
            </div>


              <p>
                <a href=".....">Forgotten Password?</a>
                </p>

            <!-- register button -->
             <br>
             <div class="login">
                <button type="submit" class="submit-btn">Login</button>
             </div>

        </form>
        <marquee behavior="" direction="">
            <img src="logo.png" alt="logo">
        </marquee>

    </div>

    <script src="formassign.js"></script>
</body>
</html>
